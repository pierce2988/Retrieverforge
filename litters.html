<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litter Directory — RetrieverForge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/gauges.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/search-modal.css">
<link rel="stylesheet" href="css/directory.css">
<link rel="stylesheet" href="css/litters.css">
</head>
<body>
<a href="#main" class="rf-skip">Skip to content</a>
<div id="rf-nav-mount"></div>

<main id="main">
  <section class="rf-directory-header">
    <div class="rf-container">
      <span class="rf-eyebrow">DIRECTORY</span>
      <h1 class="rf-display-lg">Litter Directory</h1>
      <p class="rf-body-lg" style="margin-top:var(--sp-3); max-width:560px; color:var(--rf-charcoal)">Upcoming, current, and past litters from verified programs.</p>
      <div class="rf-tabs" id="rf-litter-tabs">
        <button class="rf-tab is-active" data-tab="Upcoming">Upcoming Litters</button>
        <button class="rf-tab" data-tab="Current">Current Litters</button>
        <button class="rf-tab" data-tab="Past">Past Litters</button>
      </div>
    </div>
  </section>

  <div class="rf-container" style="padding:var(--sp-7) 0 var(--sp-10)">
    <div class="rf-grid" id="rf-litters-grid"></div>
  </div>
</main>

<div id="rf-footer-mount"></div>

<script src="js/illustrations.js"></script>
<script src="js/gauges.js"></script>
<script src="js/data.js"></script>
<script src="js/chrome.js"></script>
<script src="js/litters.js"></script>
</body>
</html>
