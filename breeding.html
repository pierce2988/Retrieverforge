<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding — RetrieverForge</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/gauges.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/search-modal.css">
<link rel="stylesheet" href="css/breeding-profile.css">
</head>
<body>
<a href="#main" class="rf-skip">Skip to content</a>
<div id="rf-nav-mount"></div>

<main id="main">
  <div class="rf-container" style="padding-top:var(--sp-6)">
    <div class="rf-caption" id="rf-breadcrumb"></div>
  </div>

  <!-- Pair header -->
  <section class="rf-bp-header">
    <div class="rf-container rf-bp-header__row">
      <div class="rf-bp-header__photo" id="rf-bp-sire-photo"></div>
      <div class="rf-bp-header__center">
        <span class="rf-pill rf-pill--copper" id="rf-bp-status"></span>
        <h1 class="rf-display-lg" id="rf-bp-title" style="margin-top:var(--sp-3)"></h1>
        <p class="rf-caption" id="rf-bp-meta" style="margin-top:var(--sp-2)"></p>
      </div>
      <div class="rf-bp-header__photo" id="rf-bp-dam-photo"></div>
    </div>
  </section>

  <div class="rf-container">
    <div class="rf-bp-layout">
      <div class="rf-bp-main">

        <section class="rf-profile-block">
          <span class="rf-eyebrow">PARENTS</span>
          <div class="rf-grid" style="grid-template-columns:repeat(2,1fr); margin-top:var(--sp-4)" id="rf-bp-parents"></div>
        </section>

        <section class="rf-profile-block">
          <span class="rf-eyebrow">PEDIGREE SNAPSHOT</span>
          <div class="rf-pedigree" id="rf-bp-pedigree" style="margin-top:var(--sp-4)"></div>
        </section>

        <section class="rf-profile-block">
          <span class="rf-eyebrow">HEALTH SUMMARY</span>
          <div class="rf-clearance-row" id="rf-bp-health" style="margin-top:var(--sp-4)"></div>
        </section>

        <section class="rf-profile-block">
          <span class="rf-eyebrow">NOTES</span>
          <p class="rf-body-lg" id="rf-bp-notes" style="margin-top:var(--sp-4); max-width:var(--rf-max-text)"></p>
        </section>

        <section class="rf-profile-block">
          <span class="rf-eyebrow">GALLERY</span>
          <div class="rf-gallery-grid" id="rf-bp-gallery" style="margin-top:var(--sp-4)"></div>
        </section>

        <section class="rf-profile-block" id="rf-bp-offspring-section">
          <span class="rf-eyebrow">FUTURE OFFSPRING TRACKING</span>
          <div class="rf-grid" id="rf-bp-offspring" style="margin-top:var(--sp-4)"></div>
        </section>

        <section class="rf-profile-block" id="rf-bp-perf-section">
          <span class="rf-eyebrow">PERFORMANCE UPDATES</span>
          <div id="rf-bp-perf-updates" style="margin-top:var(--sp-4)"></div>
        </section>

      </div>

      <aside class="rf-profile-sidebar">
        <div class="rf-sidebar-card" id="rf-bp-breeder-mount"></div>
        <div class="rf-sidebar-card" id="rf-bp-stats-mount"></div>
      </aside>
    </div>
  </div>
</main>

<div id="rf-footer-mount"></div>

<script src="js/illustrations.js"></script>
<script src="js/gauges.js"></script>
<script src="js/data.js"></script>
<script src="js/chrome.js"></script>
<script src="js/breeding-profile.js"></script>
</body>
</html>
