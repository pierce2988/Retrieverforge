<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Directory — RetrieverForge</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/gauges.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/search-modal.css">
<link rel="stylesheet" href="css/directory.css">
</head>
<body>
<a href="#main" class="rf-skip">Skip to content</a>
<div id="rf-nav-mount"></div>

<main id="main">
  <section class="rf-directory-header">
    <div class="rf-container">
      <span class="rf-eyebrow">DIRECTORY</span>
      <h1 class="rf-display-lg">Dog Directory</h1>
      <p class="rf-body-lg" style="margin-top:var(--sp-3); max-width:560px; color:var(--rf-charcoal)">Every verified dog on RetrieverForge — studs, brood females, and developing prospects.</p>
    </div>
  </section>

  <div class="rf-container">
    <div class="rf-directory-layout">
      <aside class="rf-filters">
        <div class="rf-filters__group">
          <div class="rf-filters__title">Sex</div>
          <label class="rf-checkbox"><input type="checkbox" data-filter="sex" value="Male"> Male</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="sex" value="Female"> Female</label>
        </div>
        <div class="rf-filters__group">
          <div class="rf-filters__title">Color</div>
          <label class="rf-checkbox"><input type="checkbox" data-filter="color" value="Black"> Black</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="color" value="Yellow"> Yellow</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="color" value="Chocolate"> Chocolate</label>
        </div>
        <div class="rf-filters__group">
          <div class="rf-filters__title">Status</div>
          <label class="rf-checkbox"><input type="checkbox" data-filter="status" value="Titled"> Titled</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="status" value="Prospect"> Prospect / In Development</label>
        </div>
        <button class="rf-btn rf-btn--ghost-light rf-btn--block rf-btn--sm" id="rf-clear-filters">Clear filters</button>
      </aside>

      <div class="rf-directory-results">
        <div class="rf-directory-toolbar">
          <span class="rf-caption" id="rf-result-count"></span>
          <div class="rf-sort">
            <label class="rf-micro" for="rf-sort-select">SORT</label>
            <select id="rf-sort-select">
              <option value="rating">Highest Rated</option>
              <option value="newest">Newest</option>
              <option value="alpha">Alphabetical</option>
            </select>
          </div>
        </div>
        <div class="rf-grid" id="rf-dogs-grid"></div>
      </div>
    </div>
  </div>
</main>

<div id="rf-footer-mount"></div>

<script src="js/illustrations.js"></script>
<script src="js/gauges.js"></script>
<script src="js/data.js"></script>
<script src="js/chrome.js"></script>
<script src="js/dogs.js"></script>
</body>
</html>
