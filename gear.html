<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gear Reviews — RetrieverForge</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/gauges.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/search-modal.css">
<link rel="stylesheet" href="css/directory.css">
</head>
<body>
<a href="#main" class="rf-skip">Skip to content</a>
<div id="rf-nav-mount"></div>

<main id="main">
  <section class="rf-directory-header">
    <div class="rf-container">
      <span class="rf-eyebrow">EQUIPMENT</span>
      <h1 class="rf-display-lg">Gear Reviews</h1>
      <p class="rf-body-lg" style="margin-top:var(--sp-3); max-width:560px; color:var(--rf-charcoal)">Field-tested equipment reviews from working retriever owners and handlers.</p>
    </div>
  </section>

  <div class="rf-container">
    <div class="rf-directory-layout">
      <aside class="rf-filters">
        <div class="rf-filters__group">
          <div class="rf-filters__title">Category</div>
          <label class="rf-checkbox"><input type="checkbox" data-filter="cat" value="E-Collars"> E-Collars</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="cat" value="Dog Boxes"> Dog Boxes</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="cat" value="Launchers"> Launchers</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="cat" value="Garmins"> Garmins</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="cat" value="Kennels"> Kennels</label>
          <label class="rf-checkbox"><input type="checkbox" data-filter="cat" value="Dog Food"> Dog Food</label>
        </div>
      </aside>
      <div class="rf-directory-results">
        <div class="rf-directory-toolbar">
          <span class="rf-caption" id="rf-result-count"></span>
          <div class="rf-sort">
            <label class="rf-micro" for="rf-sort-select">SORT</label>
            <select id="rf-sort-select">
              <option value="score">Highest Score</option>
              <option value="community">Community Rating</option>
            </select>
          </div>
        </div>
        <div class="rf-grid rf-grid--3" id="rf-gear-grid"></div>
      </div>
    </div>
  </div>
</main>

<div id="rf-footer-mount"></div>

<script src="js/illustrations.js"></script>
<script src="js/gauges.js"></script>
<script src="js/data.js"></script>
<script src="js/chrome.js"></script>
<script src="js/gear.js"></script>
</body>
</html>
