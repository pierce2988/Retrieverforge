<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gear Review — RetrieverForge</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/gauges.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/search-modal.css">
<link rel="stylesheet" href="css/gear-detail.css">
</head>
<body>
<a href="#main" class="rf-skip">Skip to content</a>
<div id="rf-nav-mount"></div>

<main id="main">
  <div class="rf-container" style="padding-top:var(--sp-6)">
    <div class="rf-caption" id="rf-breadcrumb"></div>
  </div>

  <div class="rf-container">
    <div class="rf-gear-detail">
      <div class="rf-gear-detail__photo" id="rf-gd-photo"></div>
      <div class="rf-gear-detail__info">
        <span class="rf-pill rf-pill--copper" id="rf-gd-cat"></span>
        <h1 class="rf-display-lg" id="rf-gd-name" style="margin-top:var(--sp-3)"></h1>
        <div class="rf-gear-detail__scores">
          <div class="rf-gear-detail__score-block">
            <span class="rf-gear-detail__score-num" id="rf-gd-score"></span>
            <span class="rf-micro">RETRIEVERFORGE SCORE</span>
          </div>
          <div class="rf-gear-detail__score-block">
            <span class="rf-gear-detail__score-num" id="rf-gd-community"></span>
            <span class="rf-micro">COMMUNITY RATING</span>
          </div>
        </div>
        <div class="rf-gear-detail__procon">
          <div>
            <div class="rf-gear-detail__procon-title rf-gear-detail__procon-title--pro">Pros</div>
            <ul id="rf-gd-pros"></ul>
          </div>
          <div>
            <div class="rf-gear-detail__procon-title rf-gear-detail__procon-title--con">Cons</div>
            <ul id="rf-gd-cons"></ul>
          </div>
        </div>
      </div>
    </div>

    <section class="rf-profile-block" style="padding:var(--sp-8) 0">
      <span class="rf-eyebrow">FROM THE FIELD</span>
      <p class="rf-body-lg" id="rf-gd-narrative" style="margin-top:var(--sp-4); max-width:var(--rf-max-text)"></p>
    </section>

    <section class="rf-profile-block" style="padding-bottom:var(--sp-9)">
      <div class="rf-section-head" style="margin-bottom:var(--sp-4)"><span class="rf-eyebrow">MORE IN THIS CATEGORY</span></div>
      <div class="rf-grid rf-grid--3" id="rf-gd-related"></div>
    </section>
  </div>
</main>

<div id="rf-footer-mount"></div>

<script src="js/illustrations.js"></script>
<script src="js/gauges.js"></script>
<script src="js/data.js"></script>
<script src="js/chrome.js"></script>
<script src="js/gear-detail.js"></script>
</body>
</html>
