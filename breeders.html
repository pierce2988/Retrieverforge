<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeder Directory — RetrieverForge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/gauges.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/search-modal.css">
<link rel="stylesheet" href="css/directory.css">
</head>
<body>
<a href="#main" class="rf-skip">Skip to content</a>
<div id="rf-nav-mount"></div>

<main id="main">
  <section class="rf-directory-header">
    <div class="rf-container">
      <span class="rf-eyebrow">DIRECTORY</span>
      <h1 class="rf-display-lg">Breeder Directory</h1>
      <p class="rf-body-lg" style="margin-top:var(--sp-3); max-width:560px; color:var(--rf-charcoal)">Verified programs across the country, ranked by transparency, health documentation, and proven production.</p>
    </div>
  </section>

  <div class="rf-container">
    <div class="rf-directory-layout">
      <aside class="rf-filters">
        <div class="rf-filters__group">
          <div class="rf-filters__title">Verification</div>
          <label class="rf-checkbox"><input type="checkbox" data-filter="verified" value="true"> Verified Only</label>
        </div>
      </aside>
      <div class="rf-directory-results">
        <div class="rf-directory-toolbar">
          <span class="rf-caption" id="rf-result-count"></span>
          <div class="rf-sort">
            <label class="rf-micro" for="rf-sort-select">SORT</label>
            <select id="rf-sort-select">
              <option value="rating">Top Rated</option>
              <option value="litters">Most Litters</option>
              <option value="founded">Longest Established</option>
              <option value="alpha">Alphabetical</option>
            </select>
          </div>
        </div>
        <div class="rf-grid rf-grid--3" id="rf-breeders-grid"></div>
      </div>
    </div>
  </div>
</main>

<div id="rf-footer-mount"></div>

<script src="js/illustrations.js"></script>
<script src="js/gauges.js"></script>
<script src="js/data.js"></script>
<script src="js/chrome.js"></script>
<script src="js/breeders.js"></script>
</body>
</html>
